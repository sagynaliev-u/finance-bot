<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #4f9eff;
    --success: #34c97b;
    --warning: #f5a623;
    --danger: #ff5f5f;
    --purple: #a78bfa;
    --radius: 14px;
    --pad: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 env(safe-area-inset-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* SCREENS */
  .screen { display: none; padding: var(--pad); }
  .screen.active { display: block; }

  /* HEADER */
  .header { margin-bottom: 20px; }
  .header-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .header-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
  .header-amount.ok { color: var(--success); }
  .header-amount.warn { color: var(--warning); }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
  .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

  /* METRICS ROW */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 14px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-value.success { color: var(--success); }
  .metric-value.warn { color: var(--warning); }
  .metric-value.danger { color: var(--danger); }

  /* ALERT */
  .alert { border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
  .alert.warn { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.25); }
  .alert.info { background: rgba(79,158,255,0.10); border: 1px solid rgba(79,158,255,0.2); }
  .alert.success { background: rgba(52,201,123,0.10); border: 1px solid rgba(52,201,123,0.2); }
  .alert-icon { font-size: 18px; flex-shrink: 0; }
  .alert-title { font-size: 14px; font-weight: 600; }
  .alert-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ENVELOPE */
  .envelope { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .envelope:last-child { border-bottom: none; }
  .env-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .env-name { font-size: 14px; font-weight: 500; }
  .env-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .env-badge.ok { background: rgba(52,201,123,0.15); color: var(--success); }
  .env-badge.warn { background: rgba(245,166,35,0.15); color: var(--warning); }
  .env-badge.over { background: rgba(255,95,95,0.15); color: var(--danger); }
  .env-badge.accum { background: rgba(167,139,250,0.15); color: var(--purple); }
  .progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .progress-bar.ok { background: var(--success); }
  .progress-bar.warn { background: var(--warning); }
  .progress-bar.over { background: var(--danger); }
  .env-amounts { display: flex; justify-content: space-between; margin-top: 4px; font-size: 12px; color: var(--muted); }

  /* ADD FORM */
  .amount-display { text-align: center; padding: 24px 0 16px; }
  .amount-big { font-size: 48px; font-weight: 700; letter-spacing: -2px; color: var(--text); }
  .amount-currency { font-size: 20px; color: var(--muted); margin-left: 4px; }

  .cats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .cat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .cat-item.selected { background: rgba(79,158,255,0.15); border-color: var(--accent); }
  .cat-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
  .cat-name { font-size: 11px; color: var(--muted); }
  .cat-item.selected .cat-name { color: var(--accent); }

  .comment-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none; }
  .comment-input:focus { border-color: var(--accent); }
  .comment-input::placeholder { color: var(--muted); }

  /* NUMPAD */
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .num-btn { background: var(--surface); border: none; border-radius: 12px; padding: 16px; font-size: 22px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.1s; }
  .num-btn:active { background: var(--surface2); }
  .num-btn.del { font-size: 18px; }

  /* DECISION */
  .decision { border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .decision.ok { background: rgba(52,201,123,0.1); border: 1px solid rgba(52,201,123,0.25); }
  .decision.over { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.25); }
  .decision-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .decision-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .decision-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .dstat { background: var(--bg); border-radius: 10px; padding: 8px; text-align: center; }
  .dstat-val { font-size: 14px; font-weight: 600; }
  .dstat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .decision-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* BUTTONS */
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-warning { background: var(--warning); color: white; }
  .btn-surface { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

  /* EVENTS */
  .month-block { margin-bottom: 20px; }
  .month-name { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .month-total { color: var(--warning); }
  .event-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .event-row:last-child { border-bottom: none; }
  .event-name { font-size: 14px; }
  .event-type { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .event-amount { font-size: 14px; font-weight: 600; color: var(--text); }
  .past { opacity: 0.35; }

  /* SECTION LABEL */
  .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 20px; }
  .section-label:first-child { margin-top: 0; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- DASHBOARD -->
<div class="screen active" id="screen-home">
  <div class="loading" id="home-loading">
    <div class="spinner"></div>
    Загружаем данные...
  </div>
  <div id="home-content" style="display:none;">
    <div class="header">
      <div class="header-label">Свободно сейчас</div>
      <div class="header-amount ok" id="h-free">—</div>
      <div class="header-sub" id="h-sub">загрузка...</div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Доход</div>
        <div class="metric-value" id="m-income">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Потрачено</div>
        <div class="metric-value warn" id="m-spent">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Обязательные</div>
        <div class="metric-value danger">380 000</div>
      </div>
      <div class="metric">
        <div class="metric-label">Резерв событий</div>
        <div class="metric-value" style="color:var(--purple)" id="m-events-reserve">—</div>
      </div>
    </div>

    <div id="alerts-zone"></div>

    <div class="section-label">Ближайшие события</div>
    <div class="card" id="upcoming-events"></div>
  </div>
</div>

<!-- ENVELOPES -->
<div class="screen" id="screen-envelopes">
  <div class="section-label">Конверты — этот месяц</div>
  <div class="card" id="env-regular"></div>

  <div class="section-label">Накопительные</div>
  <div class="card" id="env-accum"></div>
</div>

<!-- ADD EXPENSE -->
<div class="screen" id="screen-add">
  <div class="amount-display">
    <span class="amount-big" id="amount-display">0</span>
    <span class="amount-currency">₸</span>
  </div>

  <div class="numpad">
    <button class="num-btn" onclick="numPress('1')">1</button>
    <button class="num-btn" onclick="numPress('2')">2</button>
    <button class="num-btn" onclick="numPress('3')">3</button>
    <button class="num-btn" onclick="numPress('4')">4</button>
    <button class="num-btn" onclick="numPress('5')">5</button>
    <button class="num-btn" onclick="numPress('6')">6</button>
    <button class="num-btn" onclick="numPress('7')">7</button>
    <button class="num-btn" onclick="numPress('8')">8</button>
    <button class="num-btn" onclick="numPress('9')">9</button>
    <button class="num-btn" onclick="numPress('000')">000</button>
    <button class="num-btn" onclick="numPress('0')">0</button>
    <button class="num-btn del" onclick="numDelete()">⌫</button>
  </div>

  <div class="section-label">Категория</div>
  <div class="cats-grid" id="cats-grid"></div>

  <input class="comment-input" id="comment-input" placeholder="Комментарий (необязательно)">

  <div id="decision-zone"></div>

  <button class="btn btn-primary" onclick="submitExpense()">Записать трату</button>
</div>

<!-- EVENTS -->
<div class="screen" id="screen-events">
  <div class="section-label">Мероприятия 2026</div>
  <div id="events-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('home', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
    Обзор
  </button>
  <button class="nav-btn" onclick="showScreen('envelopes', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8L2 7h20l-6-4z"/></svg>
    Конверты
  </button>
  <button class="nav-btn" onclick="showScreen('add', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    Трата
  </button>
  <button class="nav-btn" onclick="showScreen('events', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    События
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3RlhroCWhiifWVeq59NRbdEoICUUJdd4yNzGDEhrmoHzHZSbl_Qy868vdgDBxJSbu_A/exec';

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const MONTHS = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const CATS = [
  { name: 'Продукты', emoji: '🛒' },
  { name: 'Транспорт', emoji: '🚗' },
  { name: 'Шоппинг', emoji: '👕' },
  { name: 'Развлечения', emoji: '🎉' },
  { name: 'Рестораны', emoji: '🍽️' },
  { name: 'Хоз товары', emoji: '🧹' },
  { name: 'Лекарства', emoji: '💊' },
  { name: 'Принцесска', emoji: '👑' },
  { name: 'Путешествия', emoji: '✈️' },
  { name: 'Коммуналка', emoji: '💡' },
  { name: 'Связь', emoji: '📱' },
  { name: 'Другое', emoji: '📦' },
];

let state = null;
let amountStr = '0';
let selectedCat = null;

function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }

// LOAD DATA
async function loadData() {
  try {
    const resp = await fetch(SCRIPT_URL + '?action=getStatus');
    state = await resp.json();
    renderHome();
    renderEnvelopes();
    renderEvents();
  } catch(e) {
    document.getElementById('home-loading').innerHTML = '<div style="color:#ff5f5f">Ошибка загрузки.<br>Проверь интернет.</div>';
  }
}

function renderHome() {
  document.getElementById('home-loading').style.display = 'none';
  document.getElementById('home-content').style.display = 'block';

  const currentMonth = new Date().getMonth() + 1;
  const eventsThisAndNext = (state.upcomingEvents || []).filter(e => e.month <= currentMonth + 1);
  const eventsReserve = eventsThisAndNext.reduce((s, e) => s + e.amount, 0);
  const realFree = state.freeBalance - eventsReserve;

  document.getElementById('h-free').textContent = fmt(realFree) + ' ₸';
  document.getElementById('h-free').className = 'header-amount ' + (realFree > 200000 ? 'ok' : 'warn');
  document.getElementById('h-sub').textContent = `С учётом резерва событий −${fmt(eventsReserve)} ₸`;
  document.getElementById('m-income').textContent = fmt(state.income);
  document.getElementById('m-spent').textContent = fmt(state.spentThisMonth);
  document.getElementById('m-events-reserve').textContent = fmt(eventsReserve);

  // Alerts
  const alerts = document.getElementById('alerts-zone');
  alerts.innerHTML = '';
  if (eventsReserve > 0) {
    alerts.innerHTML += `<div class="alert warn">
      <div class="alert-icon">⚡</div>
      <div><div class="alert-title">Зарезервировано под события</div>
      <div class="alert-sub">${fmt(eventsReserve)} ₸ надо отложить на ближайшие события</div></div>
    </div>`;
  }

  // Upcoming
  const upEl = document.getElementById('upcoming-events');
  const upcoming = (state.upcomingEvents || []).slice(0, 4);
  if (upcoming.length === 0) {
    upEl.innerHTML = '<div style="color:var(--muted);font-size:14px;text-align:center;padding:10px">Нет ближайших событий</div>';
  } else {
    upEl.innerHTML = upcoming.map(e => `
      <div class="event-row">
        <div>
          <div class="event-name">${e.name}</div>
          <div class="event-type">${MONTHS[e.month]}</div>
        </div>
        <div class="event-amount">${fmt(e.amount)} ₸</div>
      </div>`).join('');
  }
}

function renderEnvelopes() {
  const regular = (state.envelopes || []).filter(e => e.type !== 'accumulative');
  const accum = (state.envelopes || []).filter(e => e.type === 'accumulative');

  const envHtml = (envs) => envs.map(e => {
    const pct = e.plan > 0 ? Math.min(e.spent / e.plan * 100, 100) : 0;
    const cls = pct >= 100 ? 'over' : pct >= 75 ? 'warn' : 'ok';
    const label = pct >= 100 ? 'Исчерпан' : pct >= 75 ? 'Осторожно' : 'В норме';
    return `<div class="envelope">
      <div class="env-row">
        <span class="env-name">${e.name}</span>
        <span class="env-badge ${cls}">${label}</span>
      </div>
      <div class="progress"><div class="progress-bar ${cls}" style="width:${pct}%"></div></div>
      <div class="env-amounts"><span>${fmt(e.spent)} ₸</span><span>из ${fmt(e.plan)} ₸</span></div>
    </div>`;
  }).join('');

  document.getElementById('env-regular').innerHTML = envHtml(regular);
  document.getElementById('env-accum').innerHTML = accum.map(e => `
    <div class="envelope">
      <div class="env-row">
        <span class="env-name">${e.name}</span>
        <span class="env-badge accum">Накоплено</span>
      </div>
      <div class="env-amounts">
        <span style="color:var(--purple);font-weight:600">${fmt(e.accumulated)} ₸</span>
        <span>+${fmt(e.plan)} ₸/мес</span>
      </div>
    </div>`).join('');
}

function renderEvents() {
  const all = state.upcomingEvents || [];
  const currentMonth = new Date().getMonth() + 1;
  const byMonth = {};
  all.forEach(e => {
    if (!byMonth[e.month]) byMonth[e.month] = [];
    byMonth[e.month].push(e);
  });

  const typeLabel = { birthday: '🎂 День рождения', trip: '✈️ Поездка', other: '🎊 Событие' };
  let html = '';
  Object.keys(byMonth).sort((a,b)=>a-b).forEach(m => {
    const evs = byMonth[m];
    const total = evs.reduce((s,e)=>s+e.amount,0);
    const isPast = parseInt(m) < currentMonth;
    html += `<div class="month-block ${isPast?'past':''}">
      <div class="month-name"><span>${MONTHS[m]}</span><span class="month-total">${isPast?'✓':fmt(total)+' ₸'}</span></div>
      <div class="card" style="padding:0 14px;">
        ${evs.map(e=>`<div class="event-row">
          <div><div class="event-name">${e.name}</div><div class="event-type">${typeLabel[e.type]||'Событие'}</div></div>
          <div class="event-amount">${fmt(e.amount)} ₸</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('events-list').innerHTML = html;
}

// NUMPAD
function numPress(val) {
  if (amountStr === '0') amountStr = val;
  else amountStr += val;
  if (amountStr.length > 9) amountStr = amountStr.slice(0, 9);
  updateAmountDisplay();
}
function numDelete() {
  amountStr = amountStr.slice(0, -1) || '0';
  updateAmountDisplay();
}
function updateAmountDisplay() {
  const n = parseInt(amountStr) || 0;
  document.getElementById('amount-display').textContent = fmt(n);
  checkDecision();
}

// CATS
function renderCats() {
  document.getElementById('cats-grid').innerHTML = CATS.map(c => `
    <div class="cat-item" onclick="selectCat('${c.name}', this)">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-name">${c.name}</span>
    </div>`).join('');
}

function selectCat(name, el) {
  selectedCat = name;
  document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  checkDecision();
}

function checkDecision() {
  const amount = parseInt(amountStr) || 0;
  const zone = document.getElementById('decision-zone');
  if (!amount || !selectedCat || amount < 1000 || !state) { zone.innerHTML = ''; return; }

  const env = (state.envelopes || []).find(e => e.name === selectedCat);
  if (!env || env.type === 'accumulative') { zone.innerHTML = ''; return; }

  const left = env.plan - env.spent;
  const isOver = amount > left;
  const daysLeft = 30 - new Date().getDate();

  if (isOver) {
    zone.innerHTML = `<div class="decision over">
      <div class="decision-title">⚠️ Превышение конверта</div>
      <div class="decision-sub">В «${selectedCat}» осталось ${fmt(left)} ₸, не хватает ${fmt(amount - left)} ₸</div>
      <div class="decision-stats">
        <div class="dstat"><div class="dstat-val">${fmt(left)} ₸</div><div class="dstat-label">Остаток</div></div>
        <div class="dstat"><div class="dstat-val" style="color:var(--danger)">−${fmt(amount-left)} ₸</div><div class="dstat-label">Дефицит</div></div>
        <div class="dstat"><div class="dstat-val">${daysLeft}</div><div class="dstat-label">Дней до конца</div></div>
      </div>
      <div class="decision-btns">
        <button class="btn btn-warning" onclick="submitExpense(true)">Всё равно записать</button>
        <button class="btn btn-surface" onclick="clearForm()">Отмена</button>
      </div>
    </div>`;
  } else {
    zone.innerHTML = `<div class="decision ok" style="margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;color:var(--success)">✓ Всё ок</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">После траты останется ${fmt(left - amount)} ₸ в конверте</div>
    </div>`;
  }
}

async function submitExpense(force = false) {
  const amount = parseInt(amountStr) || 0;
  if (amount < 100) { showToast('Введи сумму'); return; }
  if (!selectedCat) { showToast('Выбери категорию'); return; }

  const env = (state.envelopes || []).find(e => e.name === selectedCat);
  if (env && (env.plan - env.spent) < amount && !force) return;

  const comment = document.getElementById('comment-input').value;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addTransaction', amount, category: selectedCat, comment })
    });

    if (env) env.spent += amount;
    state.spentThisMonth += amount;
    state.freeBalance -= amount;

    clearForm();
    showToast('✓ Записано');
    renderHome();
    renderEnvelopes();
    showScreen('home', document.querySelector('.nav-btn'));
  } catch(e) {
    showToast('Ошибка — попробуй снова');
  }
}

function clearForm() {
  amountStr = '0';
  selectedCat = null;
  document.getElementById('amount-display').textContent = '0';
  document.getElementById('comment-input').value = '';
  document.getElementById('decision-zone').innerHTML = '';
  document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('selected'));
}

// NAV
function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  btn.classList.add('active');
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderCats();
loadData();
</script>
</body>
</html>
